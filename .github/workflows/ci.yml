name: CI

on:
  push:
    branches: [main]
  pull_request:

# 무인 매매 봇: 테스트 게이트가 유일한 자동 안전망이므로 기본 권한은 읽기 전용으로 최소화한다.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · gofmt · test-race
    runs-on: ubuntu-latest
    steps:
      # 공급망 안전: 액션은 mutable 태그가 아니라 full commit SHA로 핀 고정한다.
      # (CI가 무인 봇의 유일한 자동 안전망이므로 태그 이동/침해로 게이트가 무력화되면 안 됨)
      # 버전 갱신은 SHA를 의도적으로 교체하는 방식으로만 한다.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # 단일 진실: go.mod의 Go 버전을 그대로 사용한다.
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt로 포맷되지 않은 파일이 있습니다:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # 동시성 코드(단일 writer 저장소, 토큰 매니저 등)는 -race 필수.
      # modernc.org/sqlite는 순수 Go라 cgo/외부 C 컴파일러가 필요 없다.
      - name: Test (race)
        run: go test -race ./...

      # 공급망: 코드가 실제 호출하는(도달 가능한) stdlib·의존성 취약점을 자동 감지한다.
      # 무인 봇에선 malformed 입력에 대한 stdlib panic = 주문 루프 정지이므로, go.mod의
      # toolchain floor가 패치되지 않아 도달 가능 취약점이 생기면 이 스텝이 non-zero로
      # 게이트를 실패시킨다(govulncheck는 호출되는 취약점이 있을 때만 exit ≠ 0). 툴 버전은
      # 재현성을 위해 태그로 핀 고정하고, stdlib 분석 버전은 go.mod의 toolchain을 따른다.
      - name: govulncheck (reachable stdlib/deps)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

      # 커밋 전 시크릿 게이트(scan.sh)의 회귀 테스트를 CI에서도 강제한다. scan_test.sh는
      # go test가 아닌 독립 셸 테스트라 CI에 명시 배선하지 않으면 게이트가 조용히
      # false-green으로 퇴행(정규식 오수정 등)해도 CI가 초록으로 통과할 수 있다.
      # (bash 3.2 fail-open 케이스는 runner의 bash가 4.4+라 자동 SKIP된다.)
      - name: Secret-gate regression (scan.sh)
        run: bash .claude/skills/opensource-maintainer/scripts/scan_test.sh

      # 위 스텝은 "스캐너가 올바로 동작하는가"만 본다(격리 픽스처 레포 대상). 이 스텝은
      # "이 PR의 실제 내용에 유출이 없는가"를 본다 — 서로 다른 보장이고 둘 다 필요하다.
      # 이게 없으면 로컬 pre-commit을 우회한 PR이 시크릿을 넣어도 회귀 테스트만 통과하면
      # CI가 초록이 된다(시크릿 게이트의 false-green).
      # --content-only: 레포 내용 스캔은 전부 수행하고, 커밋 머신의 git config 점검만
      # 건너뛴다(러너는 커밋 주체가 아니고 user.email이 없어 항상 실패하므로).
      # 의도적 합성 픽스처는 소스에 명시한 `scan-allow:` per-line 마커로만 좁게 허용된다.
      - name: Secret scan (repository contents)
        run: bash .claude/skills/opensource-maintainer/scripts/scan.sh --all --content-only
