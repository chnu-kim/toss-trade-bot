name: CI

on:
  push:
    branches: [main]
  pull_request:

# 무인 매매 봇: 테스트 게이트가 유일한 자동 안전망이므로 기본 권한은 읽기 전용으로 최소화한다.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · gofmt · test-race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 단일 진실: go.mod의 Go 버전을 그대로 사용한다.
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt로 포맷되지 않은 파일이 있습니다:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # 동시성 코드(단일 writer 저장소, 토큰 매니저 등)는 -race 필수.
      # modernc.org/sqlite는 순수 Go라 cgo/외부 C 컴파일러가 필요 없다.
      - name: Test (race)
        run: go test -race ./...
