name: CI

on:
  push:
    branches: [main]
  pull_request:

# 무인 매매 봇: 테스트 게이트가 유일한 자동 안전망이므로 기본 권한은 읽기 전용으로 최소화한다.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · gofmt · test-race
    runs-on: ubuntu-latest
    steps:
      # 공급망 안전: 액션은 mutable 태그가 아니라 full commit SHA로 핀 고정한다.
      # (CI가 무인 봇의 유일한 자동 안전망이므로 태그 이동/침해로 게이트가 무력화되면 안 됨)
      # 버전 갱신은 SHA를 의도적으로 교체하는 방식으로만 한다.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # 단일 진실: go.mod의 Go 버전을 그대로 사용한다.
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt로 포맷되지 않은 파일이 있습니다:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # 동시성 코드(단일 writer 저장소, 토큰 매니저 등)는 -race 필수.
      # modernc.org/sqlite는 순수 Go라 cgo/외부 C 컴파일러가 필요 없다.
      - name: Test (race)
        run: go test -race ./...
